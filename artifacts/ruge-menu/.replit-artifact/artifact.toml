kind = "web"
previewPath = "/"
title = "Ruge Hamburguesas - Menú Digital"
version = "1.0.0"
id = "artifacts/ruge-menu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26113

[services.development]
run = "pnpm --filter @workspace/ruge-menu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ruge-menu", "run", "build" ]
publicDir = "artifacts/ruge-menu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26113"
BASE_PATH = "/"
